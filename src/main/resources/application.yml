spring:

  datasource:
    url: jdbc:mysql://passroute-rds.cdycuqciemah.ap-northeast-2.rds.amazonaws.com:3306/passroute?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: admin
    password: ${RDS_PASSWD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  application:
    name: passroute-backend

  profiles:
    active: local

server:
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:cGFzc3JvdXRlLWJhY2tlbmQtand0LXNlY3JldC1rZXktZm9yLWRldmVsb3BtZW50LW9ubHk=}
  access-token-expiration: 1800000    # 30분
  refresh-token-expiration: 604800000 # 7일

cors:
  allowed-origins:
    - http://localhost:3000

swagger:
  server-url:
    local: http://localhost:8080/api
    prod: https://pass-route.com/api