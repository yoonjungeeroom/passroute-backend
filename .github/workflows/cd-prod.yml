name: CD Prod Workflow

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-push-docker-image:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2.6.0
        with:
          arguments: clean bootJar

      - name: Docker image build
        run: docker build -f Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:prod .

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Docker Hub push
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:prod

  deploy-to-ec2:
    needs: build-and-push-docker-image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Upload deploy-prod.sh to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USERNAME }}
          key: ${{ secrets.PROD_EC2_KEY }}
          source: "deploy/deploy-prod.sh"
          target: "/home/ubuntu"

      - name: Run deploy-prod.sh on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USERNAME }}
          key: ${{ secrets.PROD_EC2_KEY }}
          script: |
            chmod +x /home/ubuntu/deploy/deploy-prod.sh

            DOCKERHUB_USERNAME='${{ secrets.DOCKERHUB_USERNAME }}' \
            DOCKER_IMAGE_NAME='${{ secrets.DOCKER_IMAGE_NAME }}' \
            IMAGE_TAG='prod' \
            PROD_MYSQL_URL='${{ secrets.PROD_MYSQL_URL }}' \
            PROD_MYSQL_USER='${{ secrets.PROD_MYSQL_USER }}' \
            PROD_MYSQL_PASSWORD='${{ secrets.PROD_MYSQL_PASSWORD }}' \
            FRONT_ORIGIN='${{ secrets.FRONT_ORIGIN }}' \
            bash /home/ubuntu/deploy/deploy-prod.sh