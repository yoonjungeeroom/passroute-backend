name: CD Prod Workflow

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-push-docker-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew clean bootJar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Docker image build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:prod
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:cache-prod
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:cache-prod,mode=max

  deploy-to-ec2:
    needs: build-and-push-docker-image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload deploy-prod.sh to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USERNAME }}
          key: ${{ secrets.PROD_EC2_KEY }}
          source: "deploy/deploy-prod.sh"
          target: "/home/ubuntu"

      - name: Run deploy-prod.sh on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USERNAME }}
          key: ${{ secrets.PROD_EC2_KEY }}
          script: |
            chmod +x /home/ubuntu/deploy/deploy-prod.sh

            DOCKERHUB_USERNAME='${{ secrets.DOCKERHUB_USERNAME }}' \
            DOCKER_IMAGE_NAME='${{ secrets.DOCKER_IMAGE_NAME }}' \
            IMAGE_TAG='prod' \
            PROD_MYSQL_URL='${{ secrets.PROD_MYSQL_URL }}' \
            PROD_MYSQL_USER='${{ secrets.PROD_MYSQL_USER }}' \
            PROD_MYSQL_PASSWORD='${{ secrets.PROD_MYSQL_PASSWORD }}' \
            FRONT_ORIGIN='${{ secrets.FRONT_ORIGIN }}' \
            bash /home/ubuntu/deploy/deploy-prod.sh